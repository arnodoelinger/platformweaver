name: OFRAT

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon --parallel --build-cache
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-jars
          path: '**/build/libs/*.jar'
          if-no-files-found: warn

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-jars
          path: artifacts

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ needs.build.outputs.version }}
          sed -n "/^# Version $VERSION$/,/^# Version /p" CHANGELOG.md \
            | sed '1d' \
            | sed '/^# Version /d' \
            | sed 's/^- \[[x ]\]\s*//' \
            | sed '/^$/d' \
            | sed 's/^/- /' > release_notes.md
          echo "Extracted changelog for $VERSION:"
          cat release_notes.md

      - name: Create GitHub Release
        run: |
          VERSION=${{ needs.build.outputs.version }}
          TAG="v${VERSION}"

          JARS=$(find artifacts -name "ofrat-*.jar" | tr '\n' ' ')

          gh release create "$TAG" \
            --title "$VERSION" \
            --notes-file release_notes.md \
            $( [[ "$VERSION" == *"-DEV"* ]] && echo "--prerelease" ) \
            $JARS \
          || gh release upload "$TAG" $JARS --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
